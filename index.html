<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schedule</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Schedule</h1>
        </div>
        <div class="topbar-actions">
          <nav class="page-tabs" aria-label="Pages">
            <button class="tab-action active" id="calendarTab" type="button">Calendar</button>
            <button class="tab-action" id="listTab" type="button">List</button>
            <button class="tab-action" id="playersTab" type="button">Players</button>
          </nav>
          <div class="today-card" aria-live="polite">
            <span id="todayLabel">Today</span>
            <strong id="clockLabel">--:--</strong>
          </div>
        </div>
      </header>

      <main>
        <section class="page active" id="calendarPage" aria-labelledby="calendarTitle">
          <div class="page-heading">
            <div>
              <h2 id="calendarTitle">Calendar</h2>
              <p id="calendarSummary">A visual look at what needs to be handled each day.</p>
            </div>
            <div class="calendar-controls">
              <button class="ghost-action" id="prevMonthButton" type="button">Prev</button>
              <strong id="monthLabel">Month</strong>
              <button class="ghost-action" id="nextMonthButton" type="button">Next</button>
            </div>
          </div>

          <div class="calendar-grid" id="calendarGrid" aria-live="polite"></div>

          <section class="calendar-detail" aria-labelledby="calendarDetailTitle">
            <div class="calendar-detail-heading">
              <div>
                <p class="eyebrow" id="calendarDetailMode">Selected</p>
                <h3 id="calendarDetailTitle">Today</h3>
              </div>
              <div class="calendar-detail-actions">
                <span id="calendarDetailSummary">No items selected.</span>
                <button class="ghost-action" id="calendarDetailClose" type="button">Close</button>
              </div>
            </div>
            <div class="calendar-detail-list" id="calendarDetailList"></div>
          </section>
        </section>

        <section class="page" id="listPage" aria-labelledby="dashboardTitle">
          <div class="page-heading">
            <div>
              <h2 id="dashboardTitle">List</h2>
              <p id="summaryText">Syncing upcoming schedules...</p>
            </div>
            <div class="sync-status">
              <span id="apiStatus">Loading season calendar</span>
            </div>
          </div>

          <div class="stats-grid compact" aria-label="Schedule summary">
            <article class="stat urgent">
              <span>Overdue</span>
              <strong id="overdueCount">0</strong>
            </article>
            <article class="stat">
              <span>Due today</span>
              <strong id="todayCount">0</strong>
            </article>
            <article class="stat">
              <span>Next 72h</span>
              <strong id="upcomingCount">0</strong>
            </article>
            <article class="stat">
              <span>Done</span>
              <strong id="sentCount">0</strong>
            </article>
          </div>

          <div class="toolbar">
            <label class="search-field">
              <span>Search</span>
              <input id="searchInput" type="search" placeholder="Player, team, opponent..." />
            </label>
            <label class="select-field">
              <span>View</span>
              <select id="statusFilter">
                <option value="active">Active</option>
                <option value="today">Today</option>
                <option value="soon">Next 72h</option>
                <option value="auto">Auto reports</option>
                <option value="manual">Manual notes</option>
                <option value="sent">Done</option>
                <option value="hidden">Removed</option>
                <option value="all">All</option>
              </select>
            </label>
          </div>

          <div class="schedule-groups" id="scheduleGroups" aria-live="polite"></div>
        </section>

        <section class="page" id="playersPage" aria-labelledby="playersTitle">
          <div class="page-heading">
            <div>
              <h2 id="playersTitle">Players</h2>
              <p id="rosterSummary">Editable roster</p>
            </div>
            <button class="primary-action" id="addPlayerButton" type="button">Add player</button>
          </div>

          <div class="players-layout">
            <div class="player-list" id="playerList"></div>
          </div>

          <section class="player-modal" id="playerModal" aria-labelledby="playerFormTitle">
            <form id="playerForm" class="player-form">
              <div class="player-form-heading">
                <div>
                  <p class="eyebrow">Player</p>
                  <h3 id="playerFormTitle">Edit player</h3>
                </div>
                <button class="ghost-action" id="cancelPlayerEditButton" type="button">Close</button>
              </div>

              <input id="playerIdInput" type="hidden" />
              <label>
                <span>Player</span>
                <input id="playerNameInput" type="text" placeholder="Player name" required />
              </label>

              <label>
                <span>Team abbreviation</span>
                <input id="playerTeamInput" type="text" placeholder="STL" required />
              </label>

              <div class="form-row">
                <label>
                  <span>Level</span>
                  <select id="playerLevelInput">
                    <option value="MLB">MLB</option>
                    <option value="AAA">AAA</option>
                  </select>
                </label>
                <label>
                  <span>Role</span>
                  <select id="playerRoleInput">
                    <option value="hitter">Hitter</option>
                    <option value="pitcher">Pitcher</option>
                  </select>
                </label>
              </div>

              <div class="check-row">
                <label class="checkbox-card">
                  <input id="playerManualInput" type="checkbox" />
                  <span>Handwritten notes</span>
                </label>
              </div>

              <button class="primary-action full-width" type="submit">Save player</button>
            </form>
          </section>
        </section>
      </main>
    </div>

    <template id="noteTemplate">
      <article class="note-card">
        <div class="note-main">
          <div class="note-title-row">
            <h3></h3>
            <span class="status-pill"></span>
          </div>
          <p class="meta-line"></p>
          <p class="details-line"></p>
        </div>
        <div class="note-actions">
          <button class="step-action made-action" type="button"></button>
          <button class="step-action sent-action" type="button"></button>
          <button class="icon-action archive-action" type="button" aria-label="Hide item">Hide</button>
        </div>
      </article>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
