<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes Schedule</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Series-ahead board</p>
          <h1>Report Tide</h1>
        </div>
        <div class="today-card" aria-live="polite">
          <span id="todayLabel">Today</span>
          <strong id="clockLabel">--:--</strong>
        </div>
      </header>

      <main class="layout">
        <section class="workspace" aria-labelledby="dashboardTitle">
          <div class="section-heading">
            <div>
              <h2 id="dashboardTitle">Coverage</h2>
              <p id="summaryText">Track every report before the next series sneaks up.</p>
            </div>
            <button class="primary-action" id="quickAddButton" type="button">Add note</button>
          </div>

          <div class="rule-strip" aria-label="Workflow rules">
            <div>
              <span>Send window</span>
              <strong>2-3 days before series</strong>
            </div>
            <div>
              <span>Auto reports</span>
              <strong>19 tracked players</strong>
            </div>
            <div>
              <span>Manual notes</span>
              <strong>Manaea, Stanek, McCullers, Liberatore</strong>
            </div>
          </div>

          <div class="stats-grid" aria-label="Schedule summary">
            <article class="stat">
              <span>Overdue</span>
              <strong id="overdueCount">0</strong>
            </article>
            <article class="stat">
              <span>Due today</span>
              <strong id="todayCount">0</strong>
            </article>
            <article class="stat">
              <span>Next 72h</span>
              <strong id="upcomingCount">0</strong>
            </article>
            <article class="stat">
              <span>Sent</span>
              <strong id="sentCount">0</strong>
            </article>
          </div>

          <div class="toolbar">
            <label class="search-field">
              <span>Search</span>
              <input id="searchInput" type="search" placeholder="Title, recipient, destination..." />
            </label>
            <label class="select-field">
              <span>View</span>
              <select id="statusFilter">
                <option value="active">Active</option>
                <option value="all">All</option>
                <option value="auto">Auto reports</option>
                <option value="manual">Manual notes</option>
                <option value="sent">Sent</option>
              </select>
            </label>
          </div>

          <div class="schedule-groups" id="scheduleGroups" aria-live="polite"></div>
        </section>

        <aside class="editor-panel" aria-labelledby="formTitle">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Build coverage</p>
              <h2 id="formTitle">Series tasks</h2>
            </div>
            <button class="ghost-action hidden" id="cancelEditButton" type="button">Cancel</button>
          </div>

          <form id="seriesForm" class="series-form">
            <label>
              <span>Opponent / series label</span>
              <input id="seriesOpponentInput" type="text" placeholder="vs ATL, at NYY, vs Buffalo..." required />
            </label>

            <div class="form-row">
              <label>
                <span>Series starts</span>
                <input id="seriesStartInput" type="date" required />
              </label>
              <label>
                <span>Send before</span>
                <select id="leadDaysInput">
                  <option value="3">3 days</option>
                  <option value="2">2 days</option>
                </select>
              </label>
            </div>

            <div class="form-row">
              <label>
                <span>Due time</span>
                <input id="seriesDueTimeInput" type="time" value="09:00" required />
              </label>
              <label>
                <span>Team filter</span>
                <input id="teamFilterInput" type="text" placeholder="Optional, ex: STL" />
              </label>
            </div>

            <div class="check-row">
              <label class="checkbox-card">
                <input id="includeAutoInput" type="checkbox" checked />
                <span>Auto reports</span>
              </label>
              <label class="checkbox-card">
                <input id="includeManualInput" type="checkbox" checked />
                <span>Manual notes</span>
              </label>
            </div>

            <button class="primary-action full-width" type="submit">Create series checklist</button>
          </form>

          <div class="divider"></div>

          <form id="noteForm" class="note-form">
            <input id="noteId" type="hidden" />

            <label>
              <span>Type</span>
              <select id="typeInput" name="type">
                <option value="manual">Manual note</option>
                <option value="auto">Auto-generated report</option>
                <option value="breakdown">Breakdown</option>
                <option value="other">Other</option>
              </select>
            </label>

            <label>
              <span>Note name</span>
              <input id="titleInput" name="title" type="text" placeholder="Weekly hitter notes" required />
            </label>

            <label>
              <span>Send to</span>
              <input id="recipientInput" name="recipient" type="text" placeholder="Coach, group chat, email list..." />
            </label>

            <label>
              <span>Destination</span>
              <input id="destinationInput" name="destination" type="text" placeholder="Email, Slack, text, Notion..." />
            </label>

            <div class="form-row">
              <label>
                <span>Due date</span>
                <input id="dateInput" name="dueDate" type="date" required />
              </label>
              <label>
                <span>Send time</span>
                <input id="timeInput" name="dueTime" type="time" required />
              </label>
            </div>

            <label>
              <span>Repeat</span>
              <select id="repeatInput" name="repeat">
                <option value="none">Does not repeat</option>
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
              </select>
            </label>

            <label>
              <span>Prep notes</span>
              <textarea id="detailsInput" name="details" rows="4" placeholder="What needs to be included before this is ready?"></textarea>
            </label>

            <div class="check-row">
              <label class="checkbox-card">
                <input id="madeInput" type="checkbox" />
                <span>Made</span>
              </label>
              <label class="checkbox-card">
                <input id="sentInput" type="checkbox" />
                <span>Sent</span>
              </label>
            </div>

            <button class="primary-action full-width" type="submit">Save note</button>
          </form>
        </aside>
      </main>
    </div>

    <template id="noteTemplate">
      <article class="note-card">
        <div class="note-main">
          <div class="note-title-row">
            <h3></h3>
            <span class="status-pill"></span>
          </div>
          <p class="meta-line"></p>
          <p class="details-line"></p>
        </div>
        <div class="note-actions">
          <button class="step-action made-action" type="button"></button>
          <button class="step-action sent-action" type="button"></button>
          <button class="icon-action edit-action" type="button" aria-label="Edit note">Edit</button>
          <button class="icon-action delete-action" type="button" aria-label="Delete note">Delete</button>
        </div>
      </article>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
